<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Encore Team Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #F4EFE6;
    --cream-light: #FBF8F0;
    --cream-dark: #E8E0CD;
    --guava: #1F3540;
    --guava-soft: #4A5C68;
    --guava-muted: #7E8C95;
    --line: #DDD2BA;
    --berry: #387E7F;
    --berry-dark: #2D6566;
    --lemon: #F7B73D;
    --green: #4F8A4A;
    --plum: #6B3D5C;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--cream);
    color: var(--guava);
    font-family: 'Outfit', system-ui, -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    letter-spacing: -0.005em;
    -webkit-font-smoothing: antialiased;
  }

  /* TOP BAR */
  .topbar { background: var(--guava); color: var(--cream-light); padding: 14px 0; border-bottom: 4px solid var(--berry); }
  .topbar-inner { max-width: 1200px; margin: 0 auto; padding: 0 32px; display: flex; justify-content: space-between; align-items: center; }
  .brand-wrap { display: flex; align-items: center; gap: 16px; }
  .brand-logo { height: 26px; width: auto; color: var(--cream-light); display: block; }
  .brand-logo svg { height: 100%; width: auto; display: block; }
  .brand-logo svg path { fill: currentColor; }
  .brand-divider { width: 1px; height: 22px; background: rgba(255,255,255,0.2); }
  .brand-tag { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.18em; color: var(--cream-dark); }
  .topbar-meta { font-size: 13px; color: var(--cream-dark); font-weight: 500; }
  .topbar-meta strong { color: var(--cream-light); font-weight: 700; }

  /* HEADER */
  .header { max-width: 1200px; margin: 0 auto; padding: 50px 32px 24px; }
  .eyebrow { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.22em; color: var(--berry); margin-bottom: 14px; }
  .page-title { font-size: clamp(36px, 5vw, 56px); font-weight: 800; line-height: 1.05; letter-spacing: -0.025em; margin-bottom: 10px; }
  .page-subtitle { font-size: 17px; color: var(--guava-soft); max-width: 640px; line-height: 1.55; }

  /* STATS */
  .stats-row { display: flex; gap: 40px; margin-top: 28px; padding-top: 28px; border-top: 1px solid var(--line); flex-wrap: wrap; }
  .stat { display: flex; flex-direction: column; }
  .stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.16em; color: var(--guava-muted); margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; color: var(--guava); font-variant-numeric: tabular-nums; line-height: 1; }

  /* GRID */
  .grid { max-width: 1200px; margin: 0 auto; padding: 28px 32px 100px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

  /* CARD */
  .card { background: var(--cream-light); border: 1px solid var(--line); border-radius: 8px; padding: 22px; transition: border-color 0.15s; display: flex; flex-direction: column; gap: 16px; }
  .card:hover { border-color: var(--berry); }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .card-name-block { min-width: 0; }
  .card-title { font-size: 19px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.2; margin-bottom: 4px; }
  .card-meta { font-size: 13px; color: var(--guava-soft); font-weight: 500; }
  .card-meta-empty { color: var(--guava-muted); font-style: italic; }

  /* ROLE BADGE */
  .role-badge { flex-shrink: 0; background: var(--guava-muted); color: var(--cream-light); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; padding: 4px 10px; border-radius: 100px; white-space: nowrap; }
  .role-badge.director { background: var(--berry); }
  .role-badge.music-director { background: var(--plum); }
  .role-badge.stage-manager { background: var(--guava); }
  .role-badge.lighting-designer { background: var(--lemon); color: var(--guava); }

  /* STATUS LIST */
  .card-status { display: flex; flex-direction: column; gap: 6px; padding: 12px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
  .status-row { display: flex; justify-content: space-between; align-items: center; font-size: 12.5px; }
  .status-label { color: var(--guava-soft); font-weight: 500; }
  .status-value { display: flex; align-items: center; gap: 6px; color: var(--guava-muted); font-weight: 600; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.04em; }
  .status-value.done { color: var(--green); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--line); }
  .status-value.done .status-dot { background: var(--green); }

  /* ACTIONS */
  .card-actions { display: flex; gap: 8px; }
  .btn { flex: 1; background: var(--berry); color: var(--cream-light); border: none; padding: 10px 14px; border-radius: 6px; font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 13px; letter-spacing: 0.02em; cursor: pointer; text-decoration: none; text-align: center; transition: background 0.15s; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
  .btn:hover { background: var(--berry-dark); }
  .btn-disabled { background: var(--line); color: var(--guava-muted); cursor: not-allowed; }
  .btn-disabled:hover { background: var(--line); }
  .btn-icon { background: transparent; color: var(--guava-soft); border: 1px solid var(--line); padding: 10px 12px; flex: 0 0 auto; cursor: pointer; border-radius: 6px; font-size: 13px; transition: all 0.15s; display: inline-flex; align-items: center; justify-content: center; }
  .btn-icon:hover { color: var(--berry); border-color: var(--berry); background: var(--cream); }

  /* ADD CARD */
  .add-card { background: transparent; border: 1px dashed var(--line); border-radius: 8px; padding: 22px; text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; min-height: 220px; transition: all 0.15s; color: inherit; }
  .add-card:hover { border-color: var(--berry); border-style: solid; background: var(--cream-light); }
  .add-card .plus { font-size: 32px; color: var(--berry); font-weight: 300; line-height: 1; }
  .add-card .label { font-weight: 700; color: var(--guava); font-size: 15px; }
  .add-card .hint { font-size: 12.5px; color: var(--guava-muted); font-weight: 500; }

  /* EMPTY / LOADING */
  .empty-state, .loading-state { grid-column: 1 / -1; padding: 80px 20px; text-align: center; color: var(--guava-muted); font-size: 14px; font-weight: 500; }

  /* FILTER BAR */
  .filter-bar { max-width: 1200px; margin: 0 auto; padding: 0 32px; display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-chip { background: var(--cream-light); border: 1px solid var(--line); padding: 7px 14px; border-radius: 100px; font-size: 12.5px; font-weight: 600; color: var(--guava-soft); cursor: pointer; transition: all 0.15s; font-family: 'Outfit', sans-serif; }
  .filter-chip:hover { border-color: var(--berry); color: var(--berry); }
  .filter-chip.active { background: var(--berry); color: var(--cream-light); border-color: var(--berry); }
  .filter-chip .count { opacity: 0.7; margin-left: 4px; font-variant-numeric: tabular-nums; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; padding: 28px 20px 80px; gap: 14px; }
    .header { padding: 40px 20px 20px; }
    .stats-row { gap: 20px; }
    .stat-value { font-size: 22px; }
    .topbar-inner { padding: 0 20px; }
    .filter-bar { padding: 0 20px; }
  }
</style>
</head>
<body>

  <div class="topbar-inner">

      <div class="brand-logo">

      <div class="brand-divider"></div>
      <span class="brand-tag">Team Dashboard</span>

    <div class="topbar-meta">Internal · <strong>Admin</strong></div>

</header>

<div class="header">
  <div class="eyebrow">Team Roster</div>
  <h1 class="page-title">Everyone on the team</h1>
  <p class="page-subtitle">Quick links to each team member's onboarding portal. Use this to test, share with team members, and check their onboarding status at a glance.</p>

  <div class="stats-row">
    <div class="stat">
      <div class="stat-label">Total members</div>
      <div class="stat-value" id="stat-total">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Active shows</div>
      <div class="stat-value" id="stat-shows">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Fully onboarded</div>
      <div class="stat-value" id="stat-complete">—</div>
    </div>
  </div>
</div>

<div class="filter-bar" id="filter-bar"></div>

<div class="grid" id="grid">
  <div class="loading-state">Loading team members…</div>
</div>

<script>
  let allMembers = [];
  let activeFilter = 'all';
  const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1zWj4EJGDrnylWFraI0gVceVTUw8n_Fl_TuGBpLrE3xI/edit';

  (async function init() {
    const grid = document.getElementById('grid');
    try {
      const response = await fetch('/.netlify/functions/get-all-team');
      if (!response.ok) {
        const errText = await response.text();
        grid.innerHTML = '<div class="empty-state">Couldn\'t load team. Status: ' + response.status + '<br><small>' + escapeHtml(errText) + '</small></div>';
        return;
      }
      const data = await response.json();
      allMembers = data.team || [];
      updateStats();
      renderFilters();
      renderGrid();
    } catch (err) {
      console.error(err);
      grid.innerHTML = '<div class="empty-state">Error: ' + escapeHtml(err.message) + '</div>';
    }
  })();

  function updateStats() {
    document.getElementById('stat-total').textContent = allMembers.length;
    const shows = new Set(allMembers.map(m => m['Show']).filter(Boolean));
    document.getElementById('stat-shows').textContent = shows.size;
    const complete = allMembers.filter(m =>
      m['Training Completed'] && m['Background Check Completed'] && m['Bio'] && m['Headshot URL']
    ).length;
    document.getElementById('stat-complete').textContent = complete;
  }

  function renderFilters() {
    const roleCounts = {};
    allMembers.forEach(m => {
      const r = m['Role'] || 'Unassigned';
      roleCounts[r] = (roleCounts[r] || 0) + 1;
    });

    const bar = document.getElementById('filter-bar');
    let html = '<button class="filter-chip ' + (activeFilter === 'all' ? 'active' : '') + '" data-filter="all">All<span class="count">' + allMembers.length + '</span></button>';
    Object.keys(roleCounts).sort().forEach(role => {
      html += '<button class="filter-chip ' + (activeFilter === role ? 'active' : '') + '" data-filter="' + escapeAttr(role) + '">' + escapeHtml(role) + '<span class="count">' + roleCounts[role] + '</span></button>';
    });
    bar.innerHTML = html;

    bar.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        activeFilter = chip.dataset.filter;
        renderFilters();
        renderGrid();
      });
    });
  }

  function renderGrid() {
    const grid = document.getElementById('grid');
    const filtered = activeFilter === 'all'
      ? allMembers
      : allMembers.filter(m => (m['Role'] || 'Unassigned') === activeFilter);

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty-state">No team members in this filter.</div>' + renderAddCard();
      return;
    }

    grid.innerHTML = filtered.map(renderCard).join('') + renderAddCard();
  }

  function renderCard(member) {
    const name = member['Name'] || 'Unnamed';
    const role = member['Role'] || 'Team Member';
    const show = member['Show'] || '';
    const slug = member['Portal URL Slug'] || '';
    const roleClass = role.toLowerCase().replace(/\s+/g, '-');

    const portalUrl = slug ? '/?director=' + encodeURIComponent(slug) : '#';

    const statuses = [
      { label: 'Training', done: !!member['Training Completed'] },
      { label: 'Background check', done: !!member['Background Check Completed'] },
      { label: 'Bio submitted', done: !!member['Bio'] },
      { label: 'Headshot', done: !!member['Headshot URL'] },
    ];

    const statusHTML = statuses.map(s =>
      '<div class="status-row">' +
        '<span class="status-label">' + s.label + '</span>' +
        '<span class="status-value' + (s.done ? ' done' : '') + '">' +
          '<span class="status-dot"></span>' +
          (s.done ? 'Done' : 'Pending') +
        '</span>' +
      '</div>'
    ).join('');

    const portalButton = slug
      ? '<a class="btn" href="' + portalUrl + '" target="_blank" rel="noopener">Open Portal →</a>'
      : '<button class="btn btn-disabled" disabled>No slug set</button>';

    const copyButton = slug
      ? '<button class="btn-icon" onclick="copyLink(\'' + escapeAttr(slug) + '\', this)" title="Copy share link">⎘</button>'
      : '';

    return [
      '<div class="card">',
        '<div class="card-header">',
          '<div class="card-name-block">',
            '<div class="card-title">' + escapeHtml(name) + '</div>',
            '<div class="card-meta' + (show ? '' : ' card-meta-empty') + '">' + escapeHtml(show || 'No show assigned') + '</div>',
          '</div>',
          '<span class="role-badge ' + escapeAttr(roleClass) + '">' + escapeHtml(role) + '</span>',
        '</div>',
        '<div class="card-status">' + statusHTML + '</div>',
        '<div class="card-actions">' + portalButton + copyButton + '</div>',
      '</div>'
    ].join('');
  }

  function renderAddCard() {
    return '<a class="add-card" href="' + SHEET_URL + '" target="_blank" rel="noopener">' +
      '<div class="plus">+</div>' +
      '<div class="label">Add Team Member</div>' +
      '<div class="hint">Opens Team Roster sheet</div>' +
    '</a>';
  }

  function copyLink(slug, btn) {
    const url = window.location.origin + '/?director=' + encodeURIComponent(slug);
    navigator.clipboard.writeText(url).then(() => {
      const original = btn.textContent;
      btn.textContent = '✓';
      btn.style.color = 'var(--green)';
      btn.style.borderColor = 'var(--green)';
      setTimeout(() => {
        btn.textContent = original;
        btn.style.color = '';
        btn.style.borderColor = '';
      }, 1500);
    });
  }

  function escapeHtml(str) {
    if (str == null) return '';
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  }
  function escapeAttr(str) { return escapeHtml(str); }
</script>

</body>
</html>
